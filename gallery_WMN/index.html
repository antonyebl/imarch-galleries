<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Architecture Gallery</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body, html { 
      width: 100%; 
      height: 100%; 
      overflow: hidden; 
      background-color: #ffffff;
      -webkit-user-select: none;
      user-select: none;
    }

    .nav-zone {
      position: absolute;
      top: 0;
      width: 50%;
      height: 100%;
      z-index: 10;
    }

    .nav-zone.left {
      left: 0;
      cursor: w-resize;
    }

    .nav-zone.right {
      right: 0;
      cursor: e-resize;
    }

    .gallery-container {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .gallery-slide {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      opacity: 0;
      transition: opacity 0.25s ease-in-out;
      pointer-events: none;
    }

    .gallery-slide.active {
      opacity: 1;
      pointer-events: auto;
    }
  </style>
</head>
<body>
  <div class="gallery-container" id="gallery"></div>
  <div class="nav-zone left"></div>
  <div class="nav-zone right"></div>
  <script>
    async function initGallery() {
      try {
        const response = await fetch('images.json');
        const images = await response.json();
        const container = document.getElementById('gallery');
        
        let currentIndex = 0;
        if (images.length === 0) return;

        images.forEach((img, index) => {
          const el = document.createElement('img');
          el.src = img.filename;
          el.className = `gallery-slide ${index === 0 ? 'active' : ''}`;
          el.alt = "Architecture View";
          container.appendChild(el);
        });

        const slides = document.querySelectorAll('.gallery-slide');

        function showSlide(newIndex) {
          slides[currentIndex].classList.remove('active');
          currentIndex = (newIndex + slides.length) % slides.length;
          slides[currentIndex].classList.add('active');
        }

        function nextSlide() { showSlide(currentIndex + 1); }
        function prevSlide() { showSlide(currentIndex - 1); }

        document.body.addEventListener('click', (e) => {
          const isLeftHalf = e.clientX < window.innerWidth / 2;
          if (isLeftHalf) {
            prevSlide();
          } else {
            nextSlide();
          }
        });

        document.addEventListener('keydown', (e) => {
          if (e.key === 'ArrowLeft') prevSlide();
          if (e.key === 'ArrowRight') nextSlide();
        });
      } catch (err) {
        console.error("Error setting up gallery:", err);
      }
    }
    initGallery();
  </script>
</body>
</html>
